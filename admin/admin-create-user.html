<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Admin - Ayala Abogados</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #161b22;
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            border: 1px solid #30363d;
        }
        h1 { font-size: 1.8rem; margin-bottom: 8px; }
        .subtitle { color: #8b949e; margin-bottom: 30px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: 500; color: #8b949e; }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: #e6edf3;
            font-size: 0.95rem;
        }
        input:focus { outline: none; border-color: #58a6ff; }
        .btn {
            background: #238636;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            transition: all 0.2s;
        }
        .btn:hover { background: #2ea043; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn.danger { background: #da3633; }
        .btn.danger:hover { background: #f85149; }
        .log {
            background: #0d1117;
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85rem;
            border: 1px solid #30363d;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .log-entry.success { color: #2ea043; }
        .log-entry.error { color: #f85149; }
        .log-entry.info { color: #58a6ff; }
        .log-entry.warning { color: #d29922; }
        .flex { display: flex; gap: 10px; }
        .flex .btn { flex: 1; }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-left: 8px;
        }
        .status-badge.success { background: #0d2b1a; color: #2ea043; }
        .status-badge.error { background: #2d0a0a; color: #f85149; }
        .status-badge.pending { background: #1f2937; color: #8b949e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>👤 Crear Administrador</h1>
        <p class="subtitle">Usando API REST de Firebase</p>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" value="monicahernandezprieto@icam.es" readonly>
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="text" id="password" value="Victoria09!" readonly>
        </div>
        <div class="form-group">
            <label>UID en Database</label>
            <input type="text" id="uid" value="admin_1782102204203_tsg3phna7" readonly>
        </div>

        <div class="flex">
            <button class="btn" id="createBtn">🚀 Crear Usuario (REST)</button>
            <button class="btn danger" id="checkBtn">🔍 Verificar</button>
        </div>

        <div class="log" id="log">
            <div class="log-entry info">📋 Esperando acción...</div>
        </div>

        <div style="margin-top: 16px; padding: 12px; background: #0d1117; border-radius: 8px; border: 1px solid #30363d;">
            <p style="font-size: 0.8rem; color: #8b949e;">
                <strong>📌 Nota:</strong> Este método usa la API REST de Firebase para crear el usuario directamente.
                Asegúrate de tener la <strong>Web API Key</strong> correcta en tu configuración.
            </p>
        </div>
    </div>

    <script>
        // Configuración - OBTENER DEL firebase-config.js
        // Vamos a usar la API KEY que está en tu firebase-config.js
        const API_KEY = 'AIzaSyCaxlVIHZ38VoZ59mcSlnCfgaF9jJ9nxL8'; // De tu error
        const EMAIL = 'monicahernandezprieto@icam.es';
        const PASSWORD = 'Victoria09!';
        const DB_UID = 'admin_1782102204203_tsg3phna7';
        const DB_URL = 'https://ayala-abogados-default-rtdb.europe-west1.firebasedatabase.app';

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString();
            const icons = {
                success: '✅',
                error: '❌',
                warning: '⚠️',
                info: 'ℹ️'
            };
            entry.textContent = `${icons[type] || '•'} [${time}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function createUserViaREST() {
            const btn = document.getElementById('createBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Creando...';

            try {
                log('🚀 Iniciando creación vía REST API...', 'info');
                log(`📧 Email: ${EMAIL}`, 'info');

                // 1. Crear usuario en Authentication via REST
                log('📝 Enviando solicitud a Firebase Auth REST API...', 'info');
                
                const signUpUrl = `https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${API_KEY}`;
                
                const response = await fetch(signUpUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: EMAIL,
                        password: PASSWORD,
                        returnSecureToken: true
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    // Si el usuario ya existe, intentamos obtenerlo
                    if (data.error && data.error.message === 'EMAIL_EXISTS') {
                        log('⚠️ El usuario ya existe en Authentication', 'warning');
                        log('🔑 Intentando obtener información del usuario...', 'info');
                        
                        // Intentar login para obtener el UID
                        const loginUrl = `https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${API_KEY}`;
                        const loginResponse = await fetch(loginUrl, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                email: EMAIL,
                                password: PASSWORD,
                                returnSecureToken: true
                            })
                        });
                        
                        const loginData = await loginResponse.json();
                        if (loginResponse.ok) {
                            const uid = loginData.localId;
                            log(`✅ Usuario encontrado. UID: ${uid}`, 'success');
                            await saveToDatabase(uid);
                            return;
                        } else {
                            throw new Error(`Login fallido: ${loginData.error?.message || 'Error desconocido'}`);
                        }
                    }
                    throw new Error(data.error?.message || 'Error al crear usuario');
                }

                const uid = data.localId;
                log(`✅ Usuario creado exitosamente. UID: ${uid}`, 'success');
                log(`🔑 Token: ${data.idToken.substring(0, 20)}...`, 'info');

                // 2. Guardar en Realtime Database
                await saveToDatabase(uid);

            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
                console.error('Error detallado:', error);
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 Crear Usuario (REST)';
            }
        }

        async function saveToDatabase(uid) {
            try {
                log('📝 Guardando en Realtime Database...', 'info');
                
                // Usar el UID proporcionado o el que viene de Auth
                const finalUid = uid || DB_UID;
                
                const adminData = {
                    activo: true,
                    apellidos: 'Hernández Prieto',
                    cargo: 'Abogado',
                    citas_asignadas: [],
                    createdAt: new Date().toISOString(),
                    createdBy: 'rest_api_manual',
                    dni: '50449151P',
                    email: EMAIL,
                    nombre: 'Monica',
                    password: PASSWORD,
                    role: 'administrador',
                    telefono: '679448261',
                    uid: finalUid
                };

                // Guardar en la ubicación correcta
                const dbUrl = `${DB_URL}/administradores/${finalUid}.json`;
                
                const response = await fetch(dbUrl, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(adminData)
                });

                if (!response.ok) {
                    throw new Error(`Error al guardar en DB: ${response.status} ${response.statusText}`);
                }

                const result = await response.json();
                log(`✅ Datos guardados en Database. UID: ${finalUid}`, 'success');
                log(`📊 Datos: ${JSON.stringify(adminData, null, 2)}`, 'info');

                // También guardar en el nodo de usuarios (por si acaso)
                try {
                    const userData = {
                        email: EMAIL,
                        nombre: 'Monica',
                        apellidos: 'Hernández Prieto',
                        role: 'administrador',
                        uid: finalUid
                    };
                    const userUrl = `${DB_URL}/usuarios/${finalUid}.json`;
                    await fetch(userUrl, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(userData)
                    });
                    log('✅ También guardado en nodo usuarios', 'success');
                } catch (e) {
                    log(`⚠️ No se pudo guardar en usuarios: ${e.message}`, 'warning');
                }

                log('🎉 ¡Configuración completada! Ahora puedes iniciar sesión.', 'success');
                log('🔑 Credenciales:', 'info');
                log(`   📧 ${EMAIL}`, 'info');
                log(`   🔒 ${PASSWORD}`, 'info');

            } catch (error) {
                log(`❌ Error al guardar en DB: ${error.message}`, 'error');
                throw error;
            }
        }

        async function checkUser() {
            const btn = document.getElementById('checkBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Verificando...';

            try {
                log('🔍 Verificando usuario...', 'info');

                // Verificar en Auth
                const loginUrl = `https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${API_KEY}`;
                const response = await fetch(loginUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: EMAIL,
                        password: PASSWORD,
                        returnSecureToken: true
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    log(`✅ Usuario existe en Auth. UID: ${data.localId}`, 'success');
                    log(`📧 Email verificado: ${data.emailVerified}`, 'info');
                    
                    // Verificar en DB
                    const dbUrl = `${DB_URL}/administradores/${data.localId}.json`;
                    const dbResponse = await fetch(dbUrl);
                    const dbData = await dbResponse.json();
                    
                    if (dbData) {
                        log(`✅ Usuario existe en DB con datos:`, 'success');
                        log(JSON.stringify(dbData, null, 2), 'info');
                    } else {
                        log('⚠️ Usuario NO existe en DB. Usa el botón de creación.', 'warning');
                        // Intentar guardar
                        await saveToDatabase(data.localId);
                    }
                } else {
                    log(`❌ Usuario NO existe en Auth: ${data.error?.message || 'Error desconocido'}`, 'error');
                    log('📝 Usa el botón "Crear Usuario" para crearlo.', 'warning');
                }

            } catch (error) {
                log(`❌ Error al verificar: ${error.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '🔍 Verificar';
            }
        }

        // Conectar botones
        document.getElementById('createBtn').addEventListener('click', createUserViaREST);
        document.getElementById('checkBtn').addEventListener('click', checkUser);

        // Verificar al cargar
        log('🔧 Herramienta lista', 'info');
        log(`📧 Email: ${EMAIL}`, 'info');
        log(`🔑 API Key: ${API_KEY.substring(0, 10)}...`, 'info');
        log('💡 Haz clic en "Verificar" para comprobar el estado actual', 'info');
    </script>
</body>
</html>
