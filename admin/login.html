<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administración | Ayala Abogados</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>">
    <style>
        .login-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }
        .login-error.visible { display: block; }

        .login-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }
        .login-success.visible { display: block; }

        .login-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--admin-border);
            border-radius: 8px;
            background: var(--admin-card);
            color: var(--admin-text);
            font-size: 0.95rem;
            transition: border-color 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .login-input:focus {
            outline: none;
            border-color: var(--admin-primary);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background: var(--admin-primary);
            color: #1a202c;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .login-btn:hover {
            background: var(--admin-primary-hover);
            transform: translateY(-1px);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-btn .spinner {
            display: none;
        }
        .login-btn.loading .spinner {
            display: inline-block;
        }
        .login-btn.loading .btn-text {
            display: none;
        }

        .role-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .role-option {
            flex: 1;
            padding: 10px;
            border: 2px solid var(--admin-border);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        .role-option:hover {
            border-color: var(--admin-primary);
        }
        .role-option.active {
            border-color: var(--admin-primary);
            background: rgba(201, 162, 39, 0.1);
        }
        .role-option i {
            display: block;
            font-size: 1.2rem;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo"><i class="fas fa-balance-scale"></i></div>
            <h1 class="login-title">Ayala Abogados</h1>
            <p class="login-subtitle">Panel de Administración</p>

            <div class="role-selector" id="roleSelector">
                <div class="role-option active" data-role="admin">
                    <i class="fas fa-shield-alt"></i>
                    Administrador
                </div>
                <div class="role-option" data-role="user">
                    <i class="fas fa-user"></i>
                    Usuario
                </div>
            </div>

            <div class="login-error" id="loginError"></div>
            <div class="login-success" id="loginSuccess"></div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" class="login-input" placeholder="su@email.com" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" class="login-input" placeholder="Su contraseña" required>
                </div>
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 0.85rem; color: var(--admin-text-muted);">
                    <input type="checkbox" id="rememberMe" style="accent-color: var(--admin-primary);">
                    <label for="rememberMe" style="cursor: pointer;">Recordarme en este dispositivo</label>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Acceder</span>
                    <span class="spinner"><i class="fas fa-spinner fa-spin"></i> Entrando...</span>
                </button>
            </form>

            <div class="login-footer">
                <p style="margin-bottom: 12px;">
                    <a href="#" id="showRegister" style="color: var(--admin-primary); font-weight: 600;">
                        <i class="fas fa-user-plus"></i> Crear cuenta nueva
                    </a>
                </p>
                <p><a href="../index.html" style="color: var(--admin-text-muted);"><i class="fas fa-arrow-left"></i> Volver al sitio web</a></p>
                <p style="margin-top: 16px; font-size: 0.75rem; color: var(--admin-text-muted);">
                    Admin por defecto: admin@ayalaabogados.es / Admin123!
                </p>
            </div>
        </div>
    </div>

    <!-- Auth Service -->
    <script src="../js/auth-service.js"></script>
    <script>
    (function() {
        'use strict';

        let selectedRole = 'admin';

        // Role selector
        document.querySelectorAll('.role-option').forEach(opt => {
            opt.addEventListener('click', function() {
                document.querySelectorAll('.role-option').forEach(o => o.classList.remove('active'));
                this.classList.add('active');
                selectedRole = this.dataset.role;

                // Update subtitle
                const subtitle = document.querySelector('.login-subtitle');
                subtitle.textContent = selectedRole === 'admin' 
                    ? 'Panel de Administración' 
                    : 'Acceso de Usuario';
            });
        });

        // Show register link
        document.getElementById('showRegister').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = '../index.html?auth=register';
        });

        // Login form
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('rememberMe').checked;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('loginError');
            const successDiv = document.getElementById('loginSuccess');

            errorDiv.classList.remove('visible');
            successDiv.classList.remove('visible');
            btn.classList.add('loading');
            btn.disabled = true;

            // Use AuthService
            const result = window.AuthService.login(email, password, remember);

            setTimeout(() => {
                btn.classList.remove('loading');
                btn.disabled = false;

                if (result.success) {
                    // Check role access
                    if (selectedRole === 'admin' && result.user.role !== 'administrador') {
                        errorDiv.textContent = 'Acceso denegado. Esta cuenta no tiene privilegios de administrador.';
                        errorDiv.classList.add('visible');
                        window.AuthService.logout();
                        return;
                    }

                    if (selectedRole === 'user' && result.user.role === 'administrador') {
                        // Admin can also access user area, that's fine
                    }

                    successDiv.textContent = '¡Bienvenido, ' + result.user.nombre + '! Redirigiendo...';
                    successDiv.classList.add('visible');

                    // Redirect based on role
                    setTimeout(() => {
                        if (result.user.role === 'administrador') {
                            window.location.href = 'index.html';
                        } else {
                            window.location.href = '../pages/perfil.html';
                        }
                    }, 800);
                } else {
                    errorDiv.textContent = result.error;
                    errorDiv.classList.add('visible');
                }
            }, 600);
        });

        // Check if already logged in
        const session = window.AuthService.getCurrentSession();
        if (session) {
            if (session.role === 'administrador') {
                window.location.href = 'index.html';
            } else {
                // Not admin, stay on login
            }
        }

        // Check URL params for messages
        const urlParams = new URLSearchParams(window.location.search);
        const msg = urlParams.get('msg');
        if (msg === 'logout') {
            const successDiv = document.getElementById('loginSuccess');
            successDiv.textContent = 'Ha cerrado sesión correctamente.';
            successDiv.classList.add('visible');
        }

    })();
    </script>
</body>
</html>
